<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
    </header>
    <main>
        <div class="card">
            <div class="card-header">
              <img src="../image/1616785606__user-icons/icons/user-circle.png" alt="User Image">
            </div>
            <div class="card-body">
              <h2>Jone Doe</h2>
              <div class="location">
                <img src="../image/1616785606__user-icons/icons/map-marker.png" alt="Location Icon" width="10">
                <span> Seattle</span>
              </div>
              <div class="info">
                <p>Developer|Engineer|Problem Solver</p>
                <p>Master of shadow and the Internet!</p>
              </div>
              <div class="edit-profile">
                <img src="../image/1616785606__user-icons/icons/gear.png" alt="Edit Icon" width="15">
                <a href="#">edit profile</a>
              </div>
            </div>

    </main>
            
</body>
</html>
